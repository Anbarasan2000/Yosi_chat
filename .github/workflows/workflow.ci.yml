name: Playwright CI

# Trigger workflow on push or pull request
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 2 * * *'  # Runs every day at 2:00 AM UTC

jobs:
  test:
    runs-on: [self-hosted, Windows, X64]

    steps:
      # 1️⃣ Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Install Node.js dependencies
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      # 3️⃣ Install Playwright browsers
      - name: Install Playwright Browsers
        run: npx playwright install

      # 4️⃣ Run Playwright tests
      - name: Run Playwright Tests
        run: npx playwright test --reporter=html

      # 5️⃣ Upload Playwright HTML report
      - name: Upload Playwright Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/

      # 6️⃣ Send Slack Notification
      - name: Send Slack Notification
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            STATUS="✅ Playwright Tests Passed"
          else
            STATUS="❌ Playwright Tests Failed"
          fi

          curl -X POST -H "Content-type: application/json" \
          --data "{\"text\":\"$STATUS\nRepo: ${{ github.repository }}\nBranch: ${{ github.ref_name }}\nRun: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" \
          ${{ secrets.SLACK_WEBHOOK_URL }}